<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Personal Dashboard</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0b0f14">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="dashboard">
    <header class="top">
      <div class="clock" id="clock">--:--:--</div>
      <div class="date" id="date">—</div>
    </header>

    <div class="grid">
      <section class="card weather" data-widget="weather">
        <div class="weather-body" id="weather"><span class="muted">a carregar…</span></div>
      </section>

      <section class="card" data-widget="calendar">
        <h2>Próximos eventos</h2>
        <ul id="calendar" class="list"><li class="muted">a carregar…</li></ul>
      </section>

      <section class="card flip" id="tasks-flip" data-mode="single" data-widget="tasks">
        <div class="flip-inner" id="tasks-inner">
          <div class="flip-face" id="tasks-front">
            <h2>Tarefas · <span class="face-label" id="front-label"></span></h2>
            <button class="flip-btn" title="Virar">⤿</button>
            <ul id="front-list" class="list"><li class="muted">a carregar…</li></ul>
          </div>
          <div class="flip-face back" id="tasks-back">
            <h2>Tarefas · <span class="face-label" id="back-label"></span></h2>
            <button class="flip-btn" title="Virar">⤿</button>
            <ul id="back-list" class="list"></ul>
          </div>
        </div>
      </section>

      <section class="card photos-card" id="photos-card" data-widget="photos" hidden>
        <div class="carousel-slide" id="slide-a"><div class="slide-bg"></div><img class="slide-fg" alt=""></div>
        <div class="carousel-slide" id="slide-b"><div class="slide-bg"></div><img class="slide-fg" alt=""></div>
      </section>

      <section class="card smarthome-card" id="smarthome-card" data-widget="smarthome">
        <svg class="sh-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M4 11.5 12 5l8 6.5"/>
          <path d="M6.5 10.5V19h11v-8.5"/>
          <path d="M9.2 15.2a4 4 0 0 1 5.6 0"/>
          <path d="M10.8 16.9a1.8 1.8 0 0 1 2.4 0"/>
        </svg>
      </section>
    </div>

    <footer class="player" id="player" hidden>
      <img class="cover" id="cover" alt="">
      <div class="track">
        <div class="title" id="track-title"></div>
        <div class="artist" id="track-artist"></div>
        <div class="progress"><div class="progress-bar" id="progress-bar"></div></div>
      </div>
      <div class="controls">
        <button class="ctrl" id="btn-prev" title="Anterior">⏮</button>
        <button class="ctrl play" id="btn-playpause" title="Play/Pause">⏸</button>
        <button class="ctrl" id="btn-next" title="Próxima">⏭</button>
      </div>
    </footer>
  </main>

  <!-- Modal Smart Home (dummy por agora) -->
  <div class="modal-overlay" id="sh-modal" hidden>
    <div class="modal">
      <div class="modal-head">
        <h2>Casa</h2>
        <button class="modal-close" id="sh-close" title="Fechar">✕</button>
      </div>

      <div class="sh-section">
        <h3>Luzes</h3>
        <div class="sh-grid" id="sh-lights"></div>
      </div>

      <div class="sh-section">
        <h3>Estores</h3>
        <div class="sh-grid" id="sh-blinds"></div>
      </div>

      <div class="sh-section">
        <h3>Clima</h3>
        <div class="sh-grid" id="sh-climate"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
