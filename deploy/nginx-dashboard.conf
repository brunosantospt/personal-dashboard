# Personal Dashboard — reverse proxy para o uvicorn (127.0.0.1:8000).
# O FastAPI serve a Dashboard View (/), o Admin (/admin), as fotos (/photos)
# e a API (/api). O Nginx só encaminha tudo para lá.
#
# Instalar: copiar para /etc/nginx/sites-available/dashboard,
#   ln -s /etc/nginx/sites-available/dashboard /etc/nginx/sites-enabled/
#   (remover o default: rm /etc/nginx/sites-enabled/default)
#   nginx -t && systemctl reload nginx
#
# HTTPS (quando tiveres domínio): mete o server_name e corre
#   certbot --nginx -d dashboard.teu-dominio.com

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;                 # responde a qualquer IP/host (sem domínio ainda)
    client_max_body_size 25m;

    # WebSocket (reconexão do dashboard em tempo real — Fase 4)
    location /ws {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
